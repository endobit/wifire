services:
  wifire:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    # Same variables; Compose also interpolates ${...} from the project .env file.
    environment:
      WIFIRE_USERNAME: ${WIFIRE_USERNAME}
      WIFIRE_PASSWORD: ${WIFIRE_PASSWORD}
    volumes:
      - ./data:/data

  dashboard:
    build: ./dashboard
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./data:/data:ro
    environment:
      GRILL_JSONL: /data/grill.jsonl
      STATIC_DIR: /app/static
